
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — FAQ</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<body data-page="faq">

    <section class="section page-hero compact-hero">

    <section class="section">

        <div class="panel" data-reveal>
          <input id="faqSearchInput" type="search" placeholder="Search within FAQ">

      </div>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
