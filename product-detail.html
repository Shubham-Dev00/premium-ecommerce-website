
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Product Detail</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="product-detail">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Product Detail</span>
        <h1>Crafted for premium everyday movement</h1>
        <p class="muted">High-resolution gallery, size guidance, real reviews, and delivery estimate in one focused page.</p>
      </div>
    </section>
    <section class="section">
      <div class="container stack-lg" id="productDetailApp">
        <div class="product-detail-grid">
          <div id="productGallery" data-reveal></div>
          <div id="productMeta" data-reveal></div>
        </div>

        <section class="stack">
          <div class="section-heading" data-reveal>
            <div>
              <span class="eyebrow">Customer voice</span>
              <h2>Recent reviews</h2>
            </div>
          </div>
          <div id="customerReviewCards" class="testimonial-grid"></div>
        </section>

        <section class="stack">
          <div class="section-heading" data-reveal>
            <div>
              <span class="eyebrow">Related</span>
              <h2>You may also like</h2>
            </div>
          </div>
          <div id="relatedProducts" class="horizontal-product-scroll"></div>
        </section>

        <section class="stack">
          <div class="section-heading" data-reveal>
            <div>
              <span class="eyebrow">Recently viewed</span>
              <h2>Continue where you left off</h2>
            </div>
          </div>
          <div id="recentProducts" class="horizontal-product-scroll"></div>
        </section>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
