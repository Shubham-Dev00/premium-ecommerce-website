
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Login</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="login">
  <header class="site-header"></header>
  <main>

    <section class="section auth-section">
      <div class="container small-container">
        <div class="auth-card panel" data-reveal>
          <span class="eyebrow">Welcome back</span>
          <h1 id="loginTitle">Sign in to your account</h1>
          <p class="muted" id="loginHint">Use the demo shopper credentials or your saved signup.</p>
          <form id="loginForm" class="stack-lg">
            <div><label>Email</label><input type="email" name="email" placeholder="demo@auren.com"></div>
            <div>
              <div class="row-between"><label>Password</label><button class="btn-ghost text-btn" type="button" id="toggleLoginPassword">Show</button></div>
              <input type="password" id="loginPassword" name="password" placeholder="Enter password">
            </div>
            <div class="row-between wrap">
              <label class="checkbox-wrap"><input type="checkbox" name="remember"> Remember me</label>
              <a href="forgot-password.html">Forgot password?</a>
            </div>
            <button class="btn full" type="submit">Login</button>
          </form>
          <div class="divider"><span>or continue with</span></div>
          <div class="row wrap social-row">
            <button class="btn-soft" data-social-login="google">Google</button>
            <button class="btn-soft" data-social-login="facebook">Facebook</button>
          </div>
          <p class="muted center">No account yet? <a href="signup.html">Create one</a></p>
          <div class="panel subtle-panel">
            <strong>Demo user:</strong> demo@auren.com / Demo@123<br>
            <strong>Demo admin:</strong> admin@auren.com / Admin@123
          </div>
        </div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
