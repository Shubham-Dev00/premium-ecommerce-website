
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN Admin — Settings</title>
  <meta name="description" content="AUREN admin control center demo.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="stack">
        <a href="dashboard.html" class="brand">
          <span class="brand-mark">A</span>
          <span class="brand-copy"><strong>AUREN</strong><span>Control Center</span></span>
        </a>
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html" class="">◫ Dashboard</a>
        <a href="products.html" class="">◧ Products</a>
        <a href="orders.html" class="">◎ Orders</a>
        <a href="customers.html" class="">◉ Customers</a>
        <a href="coupons.html" class="">⌁ Coupons</a>
        <a href="analytics.html" class="">◌ Analytics</a>
        <a href="settings.html" class="active">⚙ Settings</a>
      </nav>
      <div class="stack">
        <a href="../index.html" class="btn-soft">Open storefront</a>
      </div>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="row">
          <button class="icon-btn mobile-admin-toggle" id="adminMenuToggle">☰</button>
          <div>
            <strong id="adminGreeting">AUREN Control Center</strong>
            <div class="muted">Operational snapshot for the demo store</div>
          </div>
        </div>
        <div class="row">
          <div class="notification-dot"></div>
          <div>
            <strong>Admin</strong>
            <div class="muted" id="adminProfileMail">admin@auren.com</div>
          </div>
          <button class="btn-secondary" id="adminLogoutBtn">Logout</button>
        </div>
      </div>

<section id="adminSettingsApp" class="stack-lg">
  <form id="adminSettingsForm" class="admin-panel admin-modal-form" data-reveal>
    <div class="row-between"><h2>Site settings</h2><button class="btn" type="submit">Save settings</button></div>
    <div class="form-grid">
      <div><label>Site name</label><input name="siteName"></div>
      <div><label>Currency</label><input name="currency"></div>
      <div><label>Free shipping threshold</label><input name="shippingThreshold" type="number"></div>
      <div><label>Tax rate (%)</label><input name="taxRate" type="number"></div>
    </div>
    <div class="form-grid">
      <label class="filter-option"><span>Email notifications</span><input type="checkbox" name="emailNotifications"></label>
      <label class="filter-option"><span>Cards enabled</span><input type="checkbox" name="paymentCards"></label>
      <label class="filter-option"><span>UPI enabled</span><input type="checkbox" name="paymentUpi"></label>
      <label class="filter-option"><span>COD enabled</span><input type="checkbox" name="paymentCod"></label>
      <label class="filter-option"><span>Wallet enabled</span><input type="checkbox" name="paymentWallet"></label>
    </div>
  </form>
</section>

    </main>
  </div>
  <script defer src="../js/auth.js"></script>
  <script defer src="../js/main.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="../js/admin.js"></script>
  <script defer src="../js/animations.js"></script>
</body>
</html>
