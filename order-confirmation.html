
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Order Confirmed</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="order-confirmation">
  <header class="site-header"></header>
  <main>

    <section class="section centered-section">
      <div class="container small-container" id="orderConfirmationApp">
        <div class="panel center stack-lg" data-reveal>
          <div class="success-check">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
              <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="6"></circle>
              <path d="M36 62L52 78L85 45" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <div>
            <span class="eyebrow">Order placed successfully</span>
            <h1>Thank you for shopping with AUREN</h1>
            <p class="muted">Your order <strong id="confirmationOrderId"></strong> is confirmed. Estimated delivery: <strong id="confirmationEta"></strong>.</p>
          </div>
          <div id="confirmationSummary" class="summary-card"></div>
          <div class="row wrap center">
            <a class="btn" href="products.html">Continue Shopping</a>
            <a class="btn-secondary" href="order-tracking.html">Track Order</a>
          </div>
        </div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
