
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Forgot Password</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="forgot-password">
  <header class="site-header"></header>
  <main>

    <section class="section auth-section">
      <div class="container small-container">
        <div class="auth-card panel" data-reveal>
          <span class="eyebrow">Reset access</span>
          <h1>Forgot your password?</h1>
          <p class="muted">Enter the email tied to your AUREN account and we’ll send a reset link UI message.</p>
          <form id="forgotPasswordForm" class="stack-lg">
            <div><label>Email</label><input type="email" name="email" placeholder="demo@auren.com"></div>
            <button class="btn full" type="submit">Send Reset Link</button>
          </form>
          <div id="forgotSuccess" class="panel hide">Reset link request submitted successfully. Please check your inbox UI.</div>
          <p class="muted center"><a href="login.html">Back to login</a></p>
        </div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
