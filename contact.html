
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Contact</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="contact">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Contact</span>
        <h1>Get in touch</h1>
        <p class="muted">Questions about products, orders, collaboration, or wholesale? Reach out through the form below.</p>
      </div>
    </section>
    <section class="section">
      <div class="container contact-grid">
        <div class="panel stack-lg" data-reveal>
          <h2>Contact form</h2>
          <form id="contactForm" class="stack-lg">
            <div class="form-grid two-col">
              <div><label>Name</label><input name="name"></div>
              <div><label>Email</label><input name="email" type="email"></div>
            </div>
            <div><label>Subject</label><input name="subject"></div>
            <div><label>Message</label><textarea name="message" rows="5"></textarea></div>
            <button class="btn" type="submit">Send Message</button>
          </form>
        </div>
        <div class="stack-lg">
          <div class="panel" data-reveal>
            <h2>Visit or write</h2>
            <p class="muted">AUREN House, 18 Carter Lane, Mumbai 400050</p>
            <p class="muted">+91 98765 43210</p>
            <p class="muted">hello@auren.com</p>
          </div>
          <div class="panel map-placeholder" data-reveal>
            <img src="https://picsum.photos/seed/auren-map/1200/900" alt="Map placeholder">
            <div class="overlay-card small">Google Maps placeholder</div>
          </div>
        </div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
