
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Checkout</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="checkout">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Checkout</span>
        <h1>Secure checkout</h1>
        <p class="muted">Address, payment, and review — streamlined into one clean flow.</p>
      </div>
    </section>
    <section class="section">
      <div class="container" id="checkoutApp">
        <div class="checkout-progress" data-reveal>
          <div class="checkout-step active" data-step="1">1. Address</div>
          <div class="checkout-step" data-step="2">2. Payment</div>
          <div class="checkout-step" data-step="3">3. Review</div>
        </div>

        <div class="panel" data-step-panel="1" data-reveal>
          <div class="section-heading"><div><span class="eyebrow">Step 1</span><h2>Delivery address</h2></div></div>
          <div id="savedAddressList" class="saved-address-grid"></div>
          <div class="form-grid two-col">
            <div><label>Full name</label><input name="name"><small class="error-text" data-error="name"></small></div>
            <div><label>Phone</label><input name="phone"><small class="error-text" data-error="phone"></small></div>
            <div><label>Pincode</label><input name="pincode"><small class="error-text" data-error="pincode"></small></div>
            <div><label>City</label><input name="city"><small class="error-text" data-error="city"></small></div>
            <div><label>State</label><input name="state"><small class="error-text" data-error="state"></small></div>
            <div style="grid-column:1/-1"><label>Address</label><textarea name="address" rows="4"></textarea><small class="error-text" data-error="address"></small></div>
          </div>
        </div>

        <div class="panel hide" data-step-panel="2" data-reveal>
          <div class="section-heading"><div><span class="eyebrow">Step 2</span><h2>Choose payment</h2></div></div>
          <div class="stack-lg">
            <label class="filter-option"><span>Credit / Debit Card</span><input type="radio" name="paymentMethod" value="card" checked></label>
            <label class="filter-option"><span>UPI</span><input type="radio" name="paymentMethod" value="upi"></label>
            <label class="filter-option"><span>Cash on Delivery</span><input type="radio" name="paymentMethod" value="cod"></label>
            <label class="filter-option"><span>Wallet</span><input type="radio" name="paymentMethod" value="wallet"></label>
          </div>
          <div class="form-grid two-col" style="margin-top:1rem;">
            <div style="grid-column:1/-1"><label>Card Number</label><input name="cardNumber" placeholder="1234 5678 9012 3456"></div>
            <div style="grid-column:1/-1"><label>UPI ID</label><input name="upiId" placeholder="name@bank"></div>
          </div>
        </div>

        <div class="panel hide" data-step-panel="3" data-reveal>
          <div class="section-heading"><div><span class="eyebrow">Step 3</span><h2>Review before placing order</h2></div></div>
          <div id="reviewSummary"></div>
        </div>

        <div class="row-between" style="margin-top:1rem">
          <button class="btn-ghost hide" id="checkoutPrevBtn">Previous</button>
          <button class="btn" id="checkoutNextBtn">Next Step</button>
        </div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
