
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Track Order</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="tracking">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Tracking</span>
        <h1>Track your order</h1>
        <p class="muted">Use your AUREN order ID to see delivery progress, courier, and tracking number.</p>
      </div>
    </section>
    <section class="section">
      <div class="container small-container stack-lg" id="trackingApp">
        <div class="panel" data-reveal>
          <div class="promo-row">
            <input id="trackOrderInput" placeholder="Enter order ID e.g. AUR14628">
            <button class="btn" id="trackOrderBtn">Track</button>
          </div>
        </div>
        <div id="trackingResult"></div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
