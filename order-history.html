
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Order History</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="order-history">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Orders</span>
        <h1>Order history</h1>
        <p class="muted">View previous purchases, expand details, track deliveries, and request cancellation or returns.</p>
      </div>
    </section>
    <section class="section">
      <div class="container stack-lg" id="orderHistoryApp">
        <div id="orderHistoryList" class="stack"></div>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>

</html>
