
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUREN — Cart</title>
  <meta name="description" content="AUREN — premium minimalist e-commerce demo built with plain HTML, CSS, and JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="cart">
  <header class="site-header"></header>
  <main>

    <section class="section page-hero compact-hero">
      <div class="container" data-reveal>
        <span class="eyebrow">Bag</span>
        <h1>Your cart</h1>
        <p class="muted">Review items, save products for later, and apply your promo code before checkout.</p>
      </div>
    </section>
    <section class="section">
      <div class="container cart-layout" id="cartApp">
        <div class="stack-lg">
          <div class="panel" data-reveal>
            <div class="row-between"><h2>Items</h2><a href="products.html" class="link-arrow">Continue shopping →</a></div>
            <div id="cartItemsList" class="cart-item-list"></div>
          </div>
          <div class="panel" data-reveal>
            <div class="row-between"><h2>Saved for later</h2><span class="muted">Move back to cart anytime</span></div>
            <div id="savedLaterList" class="saved-list"></div>
          </div>
          <div class="stack">
            <div class="section-heading" data-reveal>
              <div><span class="eyebrow">Recommended</span><h2>Finish the set</h2></div>
            </div>
            <div id="cartRecommendations" class="product-grid"></div>
          </div>
        </div>
        <aside class="stack-lg">
          <div class="summary-card panel" data-reveal>
            <h3>Promo code</h3>
            <div class="promo-row"><input id="promoInput" placeholder="SAVE10 or FREESHIP"><button class="btn-secondary" id="promoApplyBtn">Apply</button></div>
          </div>
          <div class="summary-card panel" data-reveal>
            <h3>Order summary</h3>
            <div class="filter-option"><span>Subtotal</span><strong id="summarySubtotal">₹0</strong></div>
            <div class="filter-option"><span>Discount</span><strong id="summaryDiscount">₹0</strong></div>
            <div class="filter-option"><span>Shipping</span><strong id="summaryShipping">Free</strong></div>
            <div class="filter-option"><span>GST</span><strong id="summaryTax">₹0</strong></div>
            <hr>
            <div class="filter-option"><span>Total</span><strong id="summaryTotal">₹0</strong></div>
            <button class="btn full" id="checkoutBtn">Proceed to Checkout</button>
          </div>
        </aside>
      </div>
    </section>

  </main>
  <footer class="site-footer"></footer>
  <script defer src="js/cart.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/animations.js"></script>
</body>
</html>
